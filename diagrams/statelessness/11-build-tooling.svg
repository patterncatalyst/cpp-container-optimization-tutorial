<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 485" role="img"
     aria-label="Build tooling: Conan dev profile (ASan, debug symbols, no LTO) vs release profile (LTO, hardening, no sanitizers) - same sources, same conan.lock, two parallel build flows">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-acc{ fill: #f0f5fc; stroke: #4a73b8; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }
      .step-ext { fill: #faf0e6; stroke: #a06030; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .pttl-acc { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .step-tm  { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .lbl-bd   { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #444; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .bad-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .acc-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
      .arrow-bad{ stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-acc{ stroke: #4a73b8; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
    <marker id="ah-bad" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a73b8"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="485"/>
  <rect width="920" height="485" fill="url(#grid)"/>

  <text x="460" y="34" text-anchor="middle" class="ttl">Build tooling: same sources, two profiles, two binaries</text>
  <text x="460" y="54" text-anchor="middle" class="cap">Conan profile selects compiler flags · CMake preset wires it · ninja builds · single conan.lock pins versions</text>

  <!-- Shared input -->
  <rect class="step" x="280" y="80" width="360" height="80"/>
  <text x="460" y="100" text-anchor="middle" class="pttl">Shared sources (one tree)</text>
  <text x="460" y="120" text-anchor="middle" class="step-tm">src/ · include/ · CMakeLists.txt · conanfile.py</text>
  <text x="460" y="138" text-anchor="middle" class="step-tm">conan.lock — pins every dep version, identical across profiles</text>
  <text x="460" y="153" text-anchor="middle" class="lbl">profile is the ONLY thing that differs between the two columns</text>

  <!-- Two arrow paths down to profile cells -->
  <path d="M 380 160 L 215 195" class="arrow-bad" marker-end="url(#ah-bad)"/>
  <path d="M 540 160 L 705 195" class="arrow-ok" marker-end="url(#ah-ok)"/>

  <!-- LEFT column: dev profile -->
  <rect class="panel-bad" x="30" y="195" width="400" height="270"/>
  <text x="230" y="218" text-anchor="middle" class="pttl-bad">profiles/dev — fast feedback</text>

  <rect class="step step-leak" x="50" y="235" width="360" height="60"/>
  <text x="230" y="255" text-anchor="middle" class="step-tm">[settings]   build_type=Debug</text>
  <text x="230" y="271" text-anchor="middle" class="step-tm">[options]    sanitizer=address  </text>
  <text x="230" y="287" text-anchor="middle" class="step-tm">[conf]       cxxflags=-O0 -g3 -fno-omit-frame-pointer</text>

  <rect class="step step-leak" x="50" y="305" width="360" height="36"/>
  <text x="230" y="328" text-anchor="middle" class="step-tm">conan install . --profile=dev</text>

  <rect class="step step-leak" x="50" y="349" width="360" height="36"/>
  <text x="230" y="372" text-anchor="middle" class="step-tm">cmake --preset=dev   (uses conan_toolchain.cmake)</text>

  <rect class="step step-leak" x="50" y="393" width="360" height="36"/>
  <text x="230" y="416" text-anchor="middle" class="step-tm">ninja                (parallel · incremental)</text>

  <rect class="step step-leak" x="50" y="437" width="360" height="22"/>
  <text x="230" y="453" text-anchor="middle" class="bad-l">dev binary — instrumented · ~50× slower · catches UB at runtime</text>

  <!-- RIGHT column: release profile -->
  <rect class="panel-ok" x="490" y="195" width="400" height="270"/>
  <text x="690" y="218" text-anchor="middle" class="pttl-ok">profiles/release — for the image</text>

  <rect class="step step-rel" x="510" y="235" width="360" height="60"/>
  <text x="690" y="255" text-anchor="middle" class="step-tm">[settings]   build_type=Release</text>
  <text x="690" y="271" text-anchor="middle" class="step-tm">[conf]       cxxflags=-O3 -flto -fstack-protector-strong</text>
  <text x="690" y="287" text-anchor="middle" class="step-tm">             ldflags=-Wl,-z,relro,-z,now -pie</text>

  <rect class="step step-rel" x="510" y="305" width="360" height="36"/>
  <text x="690" y="328" text-anchor="middle" class="step-tm">conan install . --profile=release</text>

  <rect class="step step-rel" x="510" y="349" width="360" height="36"/>
  <text x="690" y="372" text-anchor="middle" class="step-tm">cmake --preset=release</text>

  <rect class="step step-rel" x="510" y="393" width="360" height="36"/>
  <text x="690" y="416" text-anchor="middle" class="step-tm">ninja                (LTO link, slowest step)</text>

  <rect class="step step-rel" x="510" y="437" width="360" height="22"/>
  <text x="690" y="453" text-anchor="middle" class="ok-l">release binary — hardened · PIE · stripped · for ubi-micro</text>
</svg>
