<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 485" role="img"
     aria-label="Health checks as the public API of statelessness: three probe types (startup, liveness, readiness) and the graceful shutdown sequence chaining stop_token, server shutdown, pool drain, destructor reverse order">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-acc{ fill: #f0f5fc; stroke: #4a73b8; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }
      .step-ext { fill: #faf0e6; stroke: #a06030; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .pttl-acc { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .step-tm  { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .lbl-bd   { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #444; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .bad-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .acc-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
      .arrow-bad{ stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-acc{ stroke: #4a73b8; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
    <marker id="ah-bad" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a73b8"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="485"/>
  <rect width="920" height="485" fill="url(#grid)"/>

  <text x="460" y="34" text-anchor="middle" class="ttl">Health checks: the public API of statelessness</text>
  <text x="460" y="54" text-anchor="middle" class="cap">Three probes · orchestrator decides on each · graceful shutdown ties scope dtors together</text>

  <!-- service lifecycle phases timeline -->
  <text x="40" y="92" class="lbl-bd">Service lifecycle</text>

  <rect class="step step-acq" x="40" y="105" width="170" height="62"/>
  <text x="125" y="125" text-anchor="middle" class="pttl-acc">1. Booting</text>
  <text x="125" y="143" text-anchor="middle" class="lbl">main() init · DB pool warm</text>
  <text x="125" y="159" text-anchor="middle" class="lbl">deps not ready yet</text>

  <path d="M 210 136 L 240 136" class="arrow-acc" marker-end="url(#ah-acc)"/>

  <rect class="step step-rel" x="240" y="105" width="170" height="62"/>
  <text x="325" y="125" text-anchor="middle" class="pttl-ok">2. Ready</text>
  <text x="325" y="143" text-anchor="middle" class="lbl">accept &amp; serve RPCs</text>
  <text x="325" y="159" text-anchor="middle" class="lbl">steady-state</text>

  <path d="M 410 136 L 440 136" class="arrow-ok" marker-end="url(#ah-ok)"/>

  <rect class="step step-leak" x="440" y="105" width="170" height="62"/>
  <text x="525" y="125" text-anchor="middle" class="pttl-bad">3. Draining</text>
  <text x="525" y="143" text-anchor="middle" class="lbl">SIGTERM received</text>
  <text x="525" y="159" text-anchor="middle" class="lbl">finish in-flight, no new</text>

  <path d="M 610 136 L 640 136" class="arrow-bad" marker-end="url(#ah-bad)"/>

  <rect class="step" x="640" y="105" width="170" height="62"/>
  <text x="725" y="125" text-anchor="middle" class="pttl">4. Stopped</text>
  <text x="725" y="143" text-anchor="middle" class="lbl">exit(0)</text>
  <text x="725" y="159" text-anchor="middle" class="lbl">orchestrator may restart</text>

  <!-- probes section -->
  <text x="40" y="200" class="lbl-bd">Three probes the orchestrator uses</text>

  <rect class="panel-acc" x="40" y="215" width="270" height="115"/>
  <text x="175" y="237" text-anchor="middle" class="pttl-acc">Startup probe</text>
  <text x="175" y="256" text-anchor="middle" class="lbl">"Still booting?"</text>
  <text x="175" y="276" text-anchor="middle" class="step-tm">grpc.health.v1.Health/Watch</text>
  <text x="175" y="296" text-anchor="middle" class="lbl">long timeout · suppresses</text>
  <text x="175" y="312" text-anchor="middle" class="lbl">liveness during C++ startup tax</text>

  <rect class="panel" x="325" y="215" width="270" height="115"/>
  <text x="460" y="237" text-anchor="middle" class="pttl">Liveness probe</text>
  <text x="460" y="256" text-anchor="middle" class="lbl">"Process alive?"</text>
  <text x="460" y="276" text-anchor="middle" class="step-tm">grpc::HealthCheckService::Check</text>
  <text x="460" y="296" text-anchor="middle" class="lbl">fail → kill + restart</text>
  <text x="460" y="312" text-anchor="middle" class="bad-l">use sparingly · easy to misuse</text>

  <rect class="panel-ok" x="610" y="215" width="270" height="115"/>
  <text x="745" y="237" text-anchor="middle" class="pttl-ok">Readiness probe</text>
  <text x="745" y="256" text-anchor="middle" class="lbl">"Ready to take traffic?"</text>
  <text x="745" y="276" text-anchor="middle" class="step-tm">SERVING / NOT_SERVING</text>
  <text x="745" y="296" text-anchor="middle" class="lbl">fail → remove from rotation</text>
  <text x="745" y="312" text-anchor="middle" class="ok-l">flip to false on SIGTERM</text>

  <!-- graceful shutdown sequence at the bottom -->
  <rect class="panel-bad" x="40" y="350" width="840" height="110"/>
  <text x="460" y="372" text-anchor="middle" class="pttl-bad">Graceful shutdown sequence (SIGTERM → exit)</text>

  <rect class="step step-leak" x="55" y="385" width="135" height="32"/>
  <text x="123" y="406" text-anchor="middle" class="step-tm">readiness=false</text>
  <path d="M 195 401 L 215 401" class="arrow-bad" marker-end="url(#ah-bad)"/>

  <rect class="step step-leak" x="220" y="385" width="135" height="32"/>
  <text x="288" y="406" text-anchor="middle" class="step-tm">stop_source.stop()</text>
  <path d="M 360 401 L 380 401" class="arrow-bad" marker-end="url(#ah-bad)"/>

  <rect class="step step-leak" x="385" y="385" width="135" height="32"/>
  <text x="453" y="406" text-anchor="middle" class="step-tm">server.Shutdown(d)</text>
  <path d="M 525 401 L 545 401" class="arrow-bad" marker-end="url(#ah-bad)"/>

  <rect class="step step-leak" x="550" y="385" width="135" height="32"/>
  <text x="618" y="406" text-anchor="middle" class="step-tm">pool drain</text>
  <path d="M 690 401 L 710 401" class="arrow-bad" marker-end="url(#ah-bad)"/>

  <rect class="step step-leak" x="715" y="385" width="150" height="32"/>
  <text x="790" y="406" text-anchor="middle" class="step-tm">~dtors (reverse)</text>

  <text x="460" y="438" text-anchor="middle" class="lbl">readiness flips first so traffic drains away · then in-flight work finishes · then destructors run in reverse construction order</text>
</svg>
