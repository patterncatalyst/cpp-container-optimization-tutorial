<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img"
     aria-label="The State Architecture Table: every piece of state belongs in exactly one of three scopes (process-scoped, request-scoped, external) with examples in each">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-acc{ fill: #f0f5fc; stroke: #4a73b8; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }
      .step-ext { fill: #faf0e6; stroke: #a06030; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .pttl-acc { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .step-tm  { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .lbl-bd   { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #444; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .bad-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .acc-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
      .arrow-bad{ stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-acc{ stroke: #4a73b8; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
    <marker id="ah-bad" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a73b8"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="500"/>
  <rect width="920" height="500" fill="url(#grid)"/>

  <text x="460" y="34" text-anchor="middle" class="ttl">The State Architecture Table: where every piece of state lives</text>
  <text x="460" y="54" text-anchor="middle" class="cap">Every piece of state belongs in exactly one of three columns. Sort early; gain everything.</text>

  <!-- column headers -->
  <rect class="panel-acc" x="30" y="80" width="280" height="40"/>
  <text x="170" y="106" text-anchor="middle" class="pttl-acc">Process-scoped</text>

  <rect class="panel-ok" x="320" y="80" width="280" height="40"/>
  <text x="460" y="106" text-anchor="middle" class="pttl-ok">Request-scoped</text>

  <rect class="panel" x="610" y="80" width="280" height="40"/>
  <text x="750" y="106" text-anchor="middle" class="pttl">External</text>

  <!-- column 1 body -->
  <rect class="step step-acq" x="30" y="130" width="280" height="345"/>
  <text x="170" y="150" text-anchor="middle" class="lbl-bd">Lives for the process lifetime</text>
  <text x="170" y="166" text-anchor="middle" class="lbl">main() owns wiring · constinit-friendly</text>

  <rect class="step" x="45" y="180" width="250" height="32"/>
  <text x="170" y="201" text-anchor="middle" class="step-tm">TracerProvider</text>
  <rect class="step" x="45" y="218" width="250" height="32"/>
  <text x="170" y="239" text-anchor="middle" class="step-tm">grpc::Channel (kept open)</text>
  <rect class="step" x="45" y="256" width="250" height="32"/>
  <text x="170" y="277" text-anchor="middle" class="step-tm">Connection pool</text>
  <rect class="step" x="45" y="294" width="250" height="32"/>
  <text x="170" y="315" text-anchor="middle" class="step-tm">Prepared-statement cache</text>
  <rect class="step" x="45" y="332" width="250" height="32"/>
  <text x="170" y="353" text-anchor="middle" class="step-tm">PMR upstream resource</text>
  <rect class="step" x="45" y="370" width="250" height="32"/>
  <text x="170" y="391" text-anchor="middle" class="step-tm">In-process LRU cache</text>
  <rect class="step" x="45" y="408" width="250" height="32"/>
  <text x="170" y="429" text-anchor="middle" class="step-tm">Parsed config</text>

  <text x="170" y="461" text-anchor="middle" class="acc-l">Sized by container limits.</text>

  <!-- column 2 body -->
  <rect class="step step-rel" x="320" y="130" width="280" height="345"/>
  <text x="460" y="150" text-anchor="middle" class="lbl-bd">Lives for one RPC</text>
  <text x="460" y="166" text-anchor="middle" class="lbl">RAII type · destructor on every exit</text>

  <rect class="step" x="335" y="180" width="250" height="32"/>
  <text x="460" y="201" text-anchor="middle" class="step-tm">RequestContext</text>
  <rect class="step" x="335" y="218" width="250" height="32"/>
  <text x="460" y="239" text-anchor="middle" class="step-tm">PMR arena (monotonic)</text>
  <rect class="step" x="335" y="256" width="250" height="32"/>
  <text x="460" y="277" text-anchor="middle" class="step-tm">Deadline (from gRPC ctx)</text>
  <rect class="step" x="335" y="294" width="250" height="32"/>
  <text x="460" y="315" text-anchor="middle" class="step-tm">Parsed request protobuf</text>
  <rect class="step" x="335" y="332" width="250" height="32"/>
  <text x="460" y="353" text-anchor="middle" class="step-tm">OTel span (root for handler)</text>
  <rect class="step" x="335" y="370" width="250" height="32"/>
  <text x="460" y="391" text-anchor="middle" class="step-tm">Idempotency key</text>
  <rect class="step" x="335" y="408" width="250" height="32"/>
  <text x="460" y="429" text-anchor="middle" class="step-tm">ScopedConnection</text>

  <text x="460" y="461" text-anchor="middle" class="ok-l">No leaks across requests, by construction.</text>

  <!-- column 3 body -->
  <rect class="step step-ext" x="610" y="130" width="280" height="345"/>
  <text x="750" y="150" text-anchor="middle" class="lbl-bd">Outside the C++ process</text>
  <text x="750" y="166" text-anchor="middle" class="lbl">Durable · shared across replicas</text>

  <rect class="step" x="625" y="180" width="250" height="32"/>
  <text x="750" y="201" text-anchor="middle" class="step-tm">Session state (Redis)</text>
  <rect class="step" x="625" y="218" width="250" height="32"/>
  <text x="750" y="239" text-anchor="middle" class="step-tm">Counters / quotas (Redis)</text>
  <rect class="step" x="625" y="256" width="250" height="32"/>
  <text x="750" y="277" text-anchor="middle" class="step-tm">Business data (Postgres)</text>
  <rect class="step" x="625" y="294" width="250" height="32"/>
  <text x="750" y="315" text-anchor="middle" class="step-tm">Object storage (S3)</text>
  <rect class="step" x="625" y="332" width="250" height="32"/>
  <text x="750" y="353" text-anchor="middle" class="step-tm">Durable workflows (Temporal)</text>
  <rect class="step" x="625" y="370" width="250" height="32"/>
  <text x="750" y="391" text-anchor="middle" class="step-tm">Message bus (Kafka / NATS)</text>
  <rect class="step" x="625" y="408" width="250" height="32"/>
  <text x="750" y="429" text-anchor="middle" class="step-tm">Outbox table (atomic w/ DB)</text>

  <text x="750" y="461" text-anchor="middle" class="cap">Replicas don't disagree about it.</text>
</svg>
