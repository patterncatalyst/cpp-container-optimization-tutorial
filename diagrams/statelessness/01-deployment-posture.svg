<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" role="img"
     aria-label="Stateless vs stateful as deployment posture: the same C++ binary, two different state choices, two different orchestrator-interaction contracts">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-acc{ fill: #f0f5fc; stroke: #4a73b8; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }
      .step-ext { fill: #faf0e6; stroke: #a06030; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .pttl-acc { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .step-tm  { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .lbl-bd   { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #444; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .bad-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .acc-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
      .arrow-bad{ stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-acc{ stroke: #4a73b8; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
    <marker id="ah-bad" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a73b8"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="500"/>
  <rect width="920" height="500" fill="url(#grid)"/>

  <text x="460" y="34" text-anchor="middle" class="ttl">Statelessness is a deployment posture, not a code property</text>
  <text x="460" y="54" text-anchor="middle" class="cap">The same C++ binary can satisfy or violate it depending on what state it holds</text>

  <!-- LEFT panel: stateless posture -->
  <rect class="panel-ok" x="30" y="80" width="420" height="400"/>
  <text x="240" y="106" text-anchor="middle" class="pttl-ok">Stateless posture — replicate freely, kill at will</text>

  <!-- orchestrator -->
  <rect class="step step-acq" x="60" y="125" width="360" height="36"/>
  <text x="240" y="148" text-anchor="middle" class="step-t">Orchestrator (kubelet · podman-systemd)</text>

  <!-- three replicas -->
  <rect class="step" x="70" y="185" width="100" height="60"/>
  <text x="120" y="207" text-anchor="middle" class="step-t">svc · #1</text>
  <text x="120" y="225" text-anchor="middle" class="lbl">no in-mem state</text>
  <text x="120" y="238" text-anchor="middle" class="lbl">that outlives a req</text>

  <rect class="step" x="190" y="185" width="100" height="60"/>
  <text x="240" y="207" text-anchor="middle" class="step-t">svc · #2</text>
  <text x="240" y="225" text-anchor="middle" class="lbl">no in-mem state</text>
  <text x="240" y="238" text-anchor="middle" class="lbl">that outlives a req</text>

  <rect class="step" x="310" y="185" width="100" height="60"/>
  <text x="360" y="207" text-anchor="middle" class="step-t">svc · #3</text>
  <text x="360" y="225" text-anchor="middle" class="lbl">no in-mem state</text>
  <text x="360" y="238" text-anchor="middle" class="lbl">that outlives a req</text>

  <!-- arrows from orchestrator to replicas -->
  <path d="M 240 161 L 120 185" class="arrow-acc" marker-end="url(#ah-acc)"/>
  <path d="M 240 161 L 240 185" class="arrow-acc" marker-end="url(#ah-acc)"/>
  <path d="M 240 161 L 360 185" class="arrow-acc" marker-end="url(#ah-acc)"/>

  <!-- external state -->
  <rect class="step step-ext" x="80" y="295" width="320" height="40"/>
  <text x="240" y="320" text-anchor="middle" class="step-t">Authoritative state: Postgres · Redis · S3</text>

  <!-- arrows from replicas to external -->
  <path d="M 120 245 L 200 295" class="arrow" marker-end="url(#ah-blk)"/>
  <path d="M 240 245 L 240 295" class="arrow" marker-end="url(#ah-blk)"/>
  <path d="M 360 245 L 280 295" class="arrow" marker-end="url(#ah-blk)"/>

  <!-- properties list -->
  <text x="50" y="365" class="lbl-bd">Orchestrator can:</text>
  <text x="50" y="384" class="lbl">• kill any replica at any time</text>
  <text x="50" y="402" class="lbl">• scale replica count up or down</text>
  <text x="50" y="420" class="lbl">• replace nodes without coordination</text>
  <text x="50" y="438" class="lbl">• route any request to any replica</text>
  <text x="50" y="461" class="ok-l">No request is "stuck" to one instance</text>

  <!-- RIGHT panel: stateful posture -->
  <rect class="panel-bad" x="470" y="80" width="420" height="400"/>
  <text x="680" y="106" text-anchor="middle" class="pttl-bad">Stateful posture — kill carries cost</text>

  <rect class="step step-acq" x="500" y="125" width="360" height="36"/>
  <text x="680" y="148" text-anchor="middle" class="step-t">Orchestrator (must remember which is which)</text>

  <!-- single replica with in-memory state -->
  <rect class="step" x="540" y="185" width="280" height="115"/>
  <text x="680" y="207" text-anchor="middle" class="step-t">svc · #1 (the "real" one)</text>
  <rect class="step step-leak" x="555" y="220" width="250" height="22"/>
  <text x="680" y="236" text-anchor="middle" class="step-tm">in-memory session_id → cart</text>
  <rect class="step step-leak" x="555" y="247" width="250" height="22"/>
  <text x="680" y="263" text-anchor="middle" class="step-tm">in-memory token cache (auth)</text>
  <rect class="step step-leak" x="555" y="274" width="250" height="22"/>
  <text x="680" y="290" text-anchor="middle" class="step-tm">in-memory counters/metrics window</text>

  <!-- sticky arrow -->
  <path d="M 680 161 L 680 185" class="arrow-bad" marker-end="url(#ah-bad)"/>
  <text x="700" y="175" class="bad-l">sticky</text>

  <!-- properties list -->
  <text x="490" y="345" class="lbl-bd">If the orchestrator kills this:</text>
  <text x="490" y="364" class="lbl">• carts lost · users re-login</text>
  <text x="490" y="382" class="lbl">• cache cold — backend stampede</text>
  <text x="490" y="400" class="lbl">• in-flight requests fail</text>
  <text x="490" y="418" class="lbl">• new replicas must "catch up"</text>
  <text x="490" y="441" class="bad-l">Same binary — different state choices.</text>
  <text x="490" y="459" class="bad-l">Posture decided by what's in memory,</text>
  <text x="490" y="477" class="bad-l">not by the language.</text>
</svg>
