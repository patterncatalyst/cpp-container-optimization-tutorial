<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 485" role="img"
     aria-label="gRPC microservices capstone: a complete order-pricing service composing process-scoped state (tracer, channel, pool), request-scoped RequestContext, and external authoritative state (Postgres, TaxService, Outbox)">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-acc{ fill: #f0f5fc; stroke: #4a73b8; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }
      .step-ext { fill: #faf0e6; stroke: #a06030; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .pttl-acc { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .step-tm  { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .lbl-bd   { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #444; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .bad-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .acc-l    { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #4a73b8; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
      .arrow-bad{ stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-acc{ stroke: #4a73b8; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
    <marker id="ah-bad" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-acc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a73b8"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="485"/>
  <rect width="920" height="485" fill="url(#grid)"/>

  <text x="460" y="34" text-anchor="middle" class="ttl">gRPC capstone: every pattern, one service</text>
  <text x="460" y="54" text-anchor="middle" class="cap">main() wires process-scope · RequestContext owns request-scope · external state at the edges</text>

  <!-- Process box -->
  <rect class="panel-acc" x="40" y="80" width="840" height="285"/>
  <text x="460" y="101" text-anchor="middle" class="pttl-acc">OrderPricingService — single process</text>
  <text x="460" y="117" text-anchor="middle" class="lbl">main() owns these — destruction in reverse on shutdown</text>

  <!-- Process-scoped row -->
  <text x="60" y="142" class="lbl-bd">Process-scoped (built once at startup)</text>

  <rect class="step step-acq" x="60" y="152" width="200" height="58"/>
  <text x="160" y="172" text-anchor="middle" class="pttl-acc">TracerProvider</text>
  <text x="160" y="190" text-anchor="middle" class="step-tm">OTLP/gRPC → Tempo</text>
  <text x="160" y="204" text-anchor="middle" class="lbl">parent for every handler span</text>

  <rect class="step step-acq" x="275" y="152" width="200" height="58"/>
  <text x="375" y="172" text-anchor="middle" class="pttl-acc">grpc::Channel</text>
  <text x="375" y="190" text-anchor="middle" class="step-tm">to TaxService:50051</text>
  <text x="375" y="204" text-anchor="middle" class="lbl">kept open · HTTP/2 keepalive</text>

  <rect class="step step-acq" x="490" y="152" width="200" height="58"/>
  <text x="590" y="172" text-anchor="middle" class="pttl-acc">PgConnectionPool</text>
  <text x="590" y="190" text-anchor="middle" class="step-tm">size=16 · idle=4</text>
  <text x="590" y="204" text-anchor="middle" class="lbl">prepared-statement cache</text>

  <rect class="step step-acq" x="705" y="152" width="160" height="58"/>
  <text x="785" y="172" text-anchor="middle" class="pttl-acc">stop_source</text>
  <text x="785" y="190" text-anchor="middle" class="step-tm">SIGTERM → stop()</text>
  <text x="785" y="204" text-anchor="middle" class="lbl">cooperative</text>

  <!-- Request-scoped row -->
  <text x="60" y="232" class="lbl-bd">Request-scoped (RequestContext — RAII on the stack)</text>

  <rect class="step step-rel" x="60" y="242" width="805" height="118"/>
  <text x="78" y="262" class="step-tm">rpc ComputePrice(OrderRequest) → PriceReply {</text>
  <text x="78" y="282" class="step-tm">  RequestContext ctx{server_ctx, deadline, &amp;pool, &amp;channel};   // ctor: arena · span · conn-checkout</text>
  <text x="78" y="302" class="step-tm">  auto rows = ctx.conn-&gt;query(sql, order_id);                  // Postgres lookup</text>
  <text x="78" y="318" class="step-tm">  auto tax  = TaxStub(channel).Quote(ctx.deadline_from_now());// outbound gRPC, deadline propagated</text>
  <text x="78" y="334" class="step-tm">  return compose(rows, tax);                                   // dtor: span ends, conn returns, arena frees</text>
  <text x="78" y="350" class="step-tm">}                                                              // exception path: same dtor</text>

  <!-- External services -->
  <text x="40" y="392" class="lbl-bd">External — authoritative state</text>

  <rect class="step step-ext" x="40" y="402" width="240" height="58"/>
  <text x="160" y="422" text-anchor="middle" class="pttl">PostgreSQL</text>
  <text x="160" y="440" text-anchor="middle" class="lbl">orders · prices · outbox</text>
  <text x="160" y="454" text-anchor="middle" class="step-tm">deadline-aware queries</text>

  <rect class="step step-ext" x="300" y="402" width="240" height="58"/>
  <text x="420" y="422" text-anchor="middle" class="pttl">TaxService (gRPC)</text>
  <text x="420" y="440" text-anchor="middle" class="lbl">jurisdiction lookup</text>
  <text x="420" y="454" text-anchor="middle" class="step-tm">deadline + correlation_id</text>

  <rect class="step step-ext" x="560" y="402" width="280" height="58"/>
  <text x="700" y="422" text-anchor="middle" class="pttl">Outbox table (Postgres)</text>
  <text x="700" y="440" text-anchor="middle" class="lbl">atomic w/ business txn</text>
  <text x="700" y="454" text-anchor="middle" class="step-tm">separate worker publishes</text>

  <!-- arrows from process to externals -->
  <path d="M 590 210 L 160 402" class="arrow" marker-end="url(#ah-blk)"/>
  <path d="M 375 210 L 420 402" class="arrow" marker-end="url(#ah-blk)"/>
  <path d="M 590 210 L 700 402" class="arrow" marker-end="url(#ah-blk)"/>
</svg>
