<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img"
     aria-label="io_uring uses two ring buffers, the Submission Queue (SQ) and the Completion Queue (CQ), both mmap-mapped into shared memory between the application and the kernel. The application writes Submission Queue Entries describing I/O operations into the SQ; the kernel reads them and processes the I/O; the kernel writes Completion Queue Entries describing results into the CQ; the application reads them. The whole flow happens through shared memory with zero or one syscall per batch instead of one syscall per operation. The shared memory boundary is the red accent.">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }
      .band     { stroke-width: 1.5; rx: 6; ry: 6; }
      .b-app    { fill: #e8f0fb; stroke: #4a73b8; }
      .b-kern   { fill: #ecdfd8; stroke: #b86742; }
      .b-shared { fill: #fdfbf7; stroke: #c0392b; stroke-width: 2; rx: 6; ry: 6; }
      .b-sq     { fill: #f0e8d8; stroke: #b89540; }
      .b-cq     { fill: #d8e8df; stroke: #5a8870; }
      .b-cell   { fill: #fdfbf7; stroke-width: 0.6; }
      .b-cell-s { fill: #fdfbf7; stroke: #b89540; stroke-width: 0.6; }
      .b-cell-c { fill: #fdfbf7; stroke: #5a8870; stroke-width: 0.6; }
      .b-comp   { fill: #fdfbf7; stroke: #c0392b; stroke-width: 1.5; rx: 4; ry: 4; }
      .ttl      { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .ttl-big  { font: 700 16px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .ttl-sub  { font: 700 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: 600 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .mono     { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .mono-sm  { font: 10px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #444; }
      .sec      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .arrow    { stroke: #2d2d2d; stroke-width: 1.4; fill: none; }
      .arrow-r  { stroke: #c0392b; stroke-width: 2; fill: none; }
      .accent-t { font: 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .accent-l { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="arrowhead-r" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="540"/>
  <rect width="900" height="540" fill="url(#grid)" opacity="0.4"/>

  <!-- Title -->
  <text x="450" y="30" class="ttl-big" text-anchor="middle">io_uring — two rings, shared memory, syscall amortization</text>

  <!-- Application layer -->
  <rect class="band b-app" x="60" y="60" width="780" height="80"/>
  <text x="450" y="84" class="ttl" text-anchor="middle">Application (user-space)</text>
  <text x="450" y="102" class="mono-sm" text-anchor="middle">io_uring_get_sqe() → fill SQE → io_uring_submit()  ┃  io_uring_wait_cqe() → read CQE → process result</text>
  <text x="450" y="124" class="sec" text-anchor="middle">your code, your buffers, never blocks on the kernel for individual ops</text>

  <!-- Arrows app -> SQ / CQ -> app -->
  <line x1="225" y1="140" x2="225" y2="180" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="180" y="160" class="mono-sm" text-anchor="end">writes</text>
  <text x="180" y="172" class="mono-sm" text-anchor="end">SQEs</text>

  <line x1="675" y1="180" x2="675" y2="140" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="720" y="160" class="mono-sm">reads</text>
  <text x="720" y="172" class="mono-sm">CQEs</text>

  <!-- SHARED MEMORY BAND - the accent -->
  <rect class="b-shared" x="60" y="180" width="780" height="180"/>
  <text x="80" y="200" class="accent-t">shared memory (mmap)</text>
  <text x="450" y="200" class="accent-l" text-anchor="middle">— this boundary is the entire point —</text>
  <text x="820" y="200" class="accent-t" text-anchor="end">no copy, no syscall per op</text>

  <!-- Submission Queue -->
  <rect class="band b-sq" x="100" y="220" width="320" height="120"/>
  <text x="260" y="244" class="ttl" text-anchor="middle">Submission Queue (SQ)</text>
  <text x="260" y="260" class="sec" text-anchor="middle">ring buffer of SQEs that the app fills</text>

  <g transform="translate(120, 274)">
    <rect class="b-cell-s" x="0"   y="0" width="44" height="48"/>
    <text x="22" y="18" class="mono-sm" text-anchor="middle">SQE</text>
    <text x="22" y="32" class="mono-sm" text-anchor="middle">READ</text>
    <text x="22" y="44" class="mono-sm" text-anchor="middle">fd=3</text>

    <rect class="b-cell-s" x="48"  y="0" width="44" height="48"/>
    <text x="70" y="18" class="mono-sm" text-anchor="middle">SQE</text>
    <text x="70" y="32" class="mono-sm" text-anchor="middle">WRITE</text>
    <text x="70" y="44" class="mono-sm" text-anchor="middle">fd=5</text>

    <rect class="b-cell-s" x="96"  y="0" width="44" height="48"/>
    <text x="118" y="18" class="mono-sm" text-anchor="middle">SQE</text>
    <text x="118" y="32" class="mono-sm" text-anchor="middle">ACCEPT</text>
    <text x="118" y="44" class="mono-sm" text-anchor="middle">fd=4</text>

    <rect class="b-cell-s" x="144" y="0" width="44" height="48"/>
    <text x="166" y="18" class="mono-sm" text-anchor="middle">SQE</text>
    <text x="166" y="32" class="mono-sm" text-anchor="middle">SEND</text>
    <text x="166" y="44" class="mono-sm" text-anchor="middle">fd=6</text>

    <rect class="b-cell-s" x="192" y="0" width="44" height="48" stroke-dasharray="2 2"/>
    <text x="214" y="32" class="mono-sm" text-anchor="middle">...</text>

    <rect class="b-cell-s" x="240" y="0" width="44" height="48" fill="#fff" opacity="0.5"/>
    <text x="262" y="32" class="mono-sm" text-anchor="middle">(empty)</text>
  </g>

  <!-- Completion Queue -->
  <rect class="band b-cq" x="480" y="220" width="320" height="120"/>
  <text x="640" y="244" class="ttl" text-anchor="middle">Completion Queue (CQ)</text>
  <text x="640" y="260" class="sec" text-anchor="middle">ring buffer of CQEs that the kernel fills</text>

  <g transform="translate(500, 274)">
    <rect class="b-cell-c" x="0"   y="0" width="44" height="48"/>
    <text x="22" y="18" class="mono-sm" text-anchor="middle">CQE</text>
    <text x="22" y="32" class="mono-sm" text-anchor="middle">res=128</text>

    <rect class="b-cell-c" x="48"  y="0" width="44" height="48"/>
    <text x="70" y="18" class="mono-sm" text-anchor="middle">CQE</text>
    <text x="70" y="32" class="mono-sm" text-anchor="middle">res=4096</text>

    <rect class="b-cell-c" x="96"  y="0" width="44" height="48"/>
    <text x="118" y="18" class="mono-sm" text-anchor="middle">CQE</text>
    <text x="118" y="32" class="mono-sm" text-anchor="middle">res=fd</text>

    <rect class="b-cell-c" x="144" y="0" width="44" height="48"/>
    <text x="166" y="18" class="mono-sm" text-anchor="middle">CQE</text>
    <text x="166" y="32" class="mono-sm" text-anchor="middle">res=512</text>

    <rect class="b-cell-c" x="192" y="0" width="44" height="48" stroke-dasharray="2 2"/>
    <text x="214" y="32" class="mono-sm" text-anchor="middle">...</text>

    <rect class="b-cell-c" x="240" y="0" width="44" height="48" fill="#fff" opacity="0.5"/>
    <text x="262" y="32" class="mono-sm" text-anchor="middle">(empty)</text>
  </g>

  <!-- Arrows kernel -> SQ/CQ -->
  <line x1="225" y1="378" x2="225" y2="346" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="240" y="365" class="mono-sm">consumes</text>

  <line x1="675" y1="346" x2="675" y2="378" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="690" y="365" class="mono-sm">produces</text>

  <!-- Kernel layer -->
  <rect class="band b-kern" x="60" y="380" width="780" height="80"/>
  <text x="450" y="404" class="ttl" text-anchor="middle">Kernel</text>
  <text x="450" y="424" class="mono-sm" text-anchor="middle">io_uring worker reads SQEs, dispatches to vfs / network / block layer, writes CQEs on completion</text>
  <text x="450" y="446" class="sec" text-anchor="middle">with IORING_SETUP_SQPOLL the kernel polls the SQ on its own — zero syscalls for steady-state I/O</text>

  <!-- Bottom comparison panel -->
  <rect class="b-comp" x="60" y="478" width="780" height="50"/>
  <text x="80" y="498" class="accent-t">Traditional read/write:</text>
  <text x="220" y="498" class="mono">1 syscall per op × N ops  =  N context switches</text>
  <text x="80" y="518" class="accent-t">io_uring:</text>
  <text x="220" y="518" class="mono">0–1 syscalls per batch of N ops  =  near-zero context switches at high QPS</text>
</svg>
