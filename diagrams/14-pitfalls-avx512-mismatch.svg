<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img"
     aria-label="The AVX-512 instruction-set mismatch pitfall. On the build host (a recent Intel CPU with AVX-512 support), gcc -march=native picks up every available CPU feature including AVX-512 and emits AVX-512 instructions in the binary. The container image preserves these instructions. When the container is deployed to a runtime host with a different CPU (older Intel without AVX-512, or AMD Zen 3, or some cloud instance types) and the process tries to execute an AVX-512 instruction, the CPU raises SIGILL (illegal instruction) and the process dies. The SIGILL on the runtime side is the failure mode, highlighted in red. The fix is to use a portable baseline like -march=x86-64-v3 instead of -march=native, or to ship per-architecture builds.">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }
      .band     { stroke-width: 1.5; rx: 6; ry: 6; }
      .b-build  { fill: #d8e8df; stroke: #5a8870; }
      .b-image  { fill: #f0e8d8; stroke: #b89540; }
      .b-runtime{ fill: #ecdfd8; stroke: #b86742; }
      .b-fail   { fill: #fdfbf7; stroke: #c0392b; stroke-width: 2; rx: 6; ry: 6; }
      .b-fix    { fill: #fdfbf7; stroke: #5a8870; stroke-width: 1.5; rx: 6; ry: 6; }
      .b-cell-b { fill: #fdfbf7; stroke: #5a8870; stroke-width: 1; rx: 4; ry: 4; }
      .b-cell-r { fill: #fdfbf7; stroke: #b86742; stroke-width: 1; rx: 4; ry: 4; }
      .b-cell-i { fill: #fdfbf7; stroke: #b89540; stroke-width: 1; rx: 4; ry: 4; }
      .ttl      { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .ttl-big  { font: 700 16px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: 600 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .mono     { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .mono-sm  { font: 10px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #444; }
      .sec      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .arrow    { stroke: #2d2d2d; stroke-width: 1.4; fill: none; }
      .arrow-r  { stroke: #c0392b; stroke-width: 2.5; fill: none; }
      .accent-t { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .accent-l { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .accent-h { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="arrowhead-r" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="540"/>
  <rect width="900" height="540" fill="url(#grid)" opacity="0.4"/>

  <!-- Title -->
  <text x="450" y="30" class="ttl-big" text-anchor="middle">AVX-512 mismatch — when -march=native bites in containers</text>

  <!-- Build host (left) -->
  <rect class="band b-build" x="30" y="60" width="260" height="220"/>
  <text x="160" y="84" class="ttl" text-anchor="middle">Build host (your laptop / CI runner)</text>
  <text x="160" y="100" class="sec" text-anchor="middle">Intel Sapphire Rapids — has AVX-512</text>

  <rect class="b-cell-b" x="50" y="120" width="220" height="80"/>
  <text x="60" y="140" class="lbl">/proc/cpuinfo flags:</text>
  <text x="60" y="160" class="mono-sm">avx avx2 avx512f avx512dq</text>
  <text x="60" y="174" class="mono-sm">avx512cd avx512bw avx512vl ...</text>
  <text x="60" y="192" class="lbl">gcc -march=native picks up ALL of these</text>

  <rect class="b-cell-b" x="50" y="216" width="220" height="50"/>
  <text x="60" y="234" class="lbl">$ gcc -march=native -O3 ...</text>
  <text x="60" y="252" class="mono-sm">emits AVX-512 instructions</text>

  <!-- Container image (middle) -->
  <rect class="band b-image" x="320" y="60" width="260" height="220"/>
  <text x="450" y="84" class="ttl" text-anchor="middle">Container image</text>
  <text x="450" y="100" class="sec" text-anchor="middle">portable file system, NON-portable CPU code</text>

  <rect class="b-cell-i" x="340" y="120" width="220" height="146"/>
  <text x="350" y="140" class="lbl">/usr/local/bin/app contains:</text>
  <text x="350" y="160" class="mono-sm">...</text>
  <text x="350" y="174" class="mono">vmovdqa64  zmm0, [rdi]   ← AVX-512</text>
  <text x="350" y="188" class="mono">vpaddq     zmm0, zmm0, zmm1</text>
  <text x="350" y="202" class="mono">vmovdqa64  [rsi], zmm0</text>
  <text x="350" y="216" class="mono-sm">...</text>
  <text x="350" y="240" class="sec">image is byte-identical regardless</text>
  <text x="350" y="254" class="sec">of which host it lands on</text>

  <!-- Runtime host (right) -->
  <rect class="band b-runtime" x="610" y="60" width="260" height="220"/>
  <text x="740" y="84" class="ttl" text-anchor="middle">Runtime host (prod / cloud)</text>
  <text x="740" y="100" class="sec" text-anchor="middle">e.g. AMD Zen 3, older Xeon, c5.large</text>

  <rect class="b-cell-r" x="630" y="120" width="220" height="80"/>
  <text x="640" y="140" class="lbl">/proc/cpuinfo flags:</text>
  <text x="640" y="160" class="mono-sm">avx avx2  (no avx512!)</text>
  <text x="640" y="180" class="lbl">CPU does not implement</text>
  <text x="640" y="194" class="mono">vmovdqa64 / zmm registers</text>

  <rect class="b-cell-r" x="630" y="216" width="220" height="50"/>
  <text x="640" y="234" class="lbl">$ podman run app</text>
  <text x="640" y="252" class="mono-sm">first AVX-512 instruction hits CPU</text>

  <!-- Arrow build -> image -->
  <line x1="290" y1="170" x2="320" y2="170" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="305" y="160" class="mono-sm" text-anchor="middle">build</text>

  <!-- Arrow image -> runtime -->
  <line x1="580" y1="170" x2="610" y2="170" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="595" y="160" class="mono-sm" text-anchor="middle">deploy</text>

  <!-- THE FAILURE (RED) -->
  <line x1="740" y1="266" x2="740" y2="296" class="arrow-r" marker-end="url(#arrowhead-r)"/>
  <rect class="b-fail" x="630" y="296" width="220" height="76"/>
  <text x="740" y="320" class="accent-h" text-anchor="middle">SIGILL</text>
  <text x="740" y="342" class="accent-l" text-anchor="middle">illegal instruction</text>
  <text x="740" y="360" class="sec" text-anchor="middle">process aborts on the first hot path</text>

  <!-- The fix band -->
  <rect class="b-fix" x="30" y="400" width="840" height="120"/>
  <text x="450" y="422" class="ttl" text-anchor="middle">The fix — choose a portable CPU baseline at build time, not the build host's</text>

  <text x="60" y="448" class="lbl">Option 1 — x86-64 micro-architecture levels (recommended)</text>
  <text x="80" y="464" class="mono-sm">x86-64       baseline; works on any x86_64 CPU (no SSE3 even)</text>
  <text x="80" y="478" class="mono-sm">x86-64-v2    SSE3-SSE4.2, popcnt — Nehalem era and newer</text>
  <text x="80" y="492" class="mono-sm">x86-64-v3    AVX, AVX2, BMI1/2, FMA — Haswell+ (most modern workloads)</text>
  <text x="80" y="506" class="mono-sm">x86-64-v4    AVX-512  — opt-in only after surveying every deployment target</text>

  <text x="490" y="448" class="lbl">Option 2 — multi-arch builds + runtime dispatch</text>
  <text x="510" y="464" class="mono-sm">build two image variants:</text>
  <text x="510" y="478" class="mono-sm">  app:v1.2-v3      (Haswell baseline)</text>
  <text x="510" y="492" class="mono-sm">  app:v1.2-v4      (AVX-512 enabled)</text>
  <text x="510" y="506" class="mono-sm">→ pick at deploy time via host CPU detection</text>
</svg>
