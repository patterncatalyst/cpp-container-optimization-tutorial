<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img"
     aria-label="Two memory layouts side by side. On the left, std::vector stores its elements in a single contiguous heap allocation, with elements packed into 64-byte cache lines; iterating over them is a single linear stream that the L1 hardware prefetcher loves, costing roughly one cache miss per 16 ints. On the right, std::list and std::map store each element in a separately allocated heap node, with explicit pointers between them; the nodes are scattered across address space, so iterating requires pointer chasing and each access is a likely cache miss. The cost difference is shown in red on the right side.">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }
      .band     { stroke-width: 1.5; rx: 6; ry: 6; }
      .b-vec    { fill: #d8e8df; stroke: #5a8870; }
      .b-list   { fill: #ecdfd8; stroke: #b86742; }
      .b-stack  { fill: #fdfbf7; stroke: #7a6f55; stroke-width: 1; rx: 3; ry: 3; }
      .b-cl-hot { fill: #d8e8df; stroke: #5a8870; stroke-width: 1; rx: 2; ry: 2; }
      .b-cl-elem{ fill: #fdfbf7; stroke: #5a8870; stroke-width: 0.5; }
      .b-node   { fill: #fdfbf7; stroke: #b86742; stroke-width: 1; rx: 3; ry: 3; }
      .b-result { fill: #fdfbf7; stroke: #c0392b; }
      .ttl      { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .ttl-big  { font: 700 16px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .ttl-sub  { font: 700 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: 600 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .mono     { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .mono-sm  { font: 10px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #444; }
      .sec      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .arrow    { stroke: #2d2d2d; stroke-width: 1.4; fill: none; }
      .arrow-r  { stroke: #c0392b; stroke-width: 2; fill: none; }
      .arrow-node{ stroke: #b86742; stroke-width: 1.4; fill: none; stroke-dasharray: 0; }
      .accent-t { font: 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .accent-l { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .green-t  { font: 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #2d6e4a; }
      .green-l  { font: italic 700 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #2d6e4a; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="arrowhead-node" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b86742"/>
    </marker>
  </defs>

  <rect class="bg" width="900" height="540"/>
  <rect width="900" height="540" fill="url(#grid)" opacity="0.4"/>

  <!-- Title -->
  <text x="450" y="30" class="ttl-big" text-anchor="middle">Container layout — contiguous vs node-based, in cache lines</text>

  <!-- LEFT: vector (contiguous) -->
  <rect class="band b-vec" x="30" y="60" width="410" height="430"/>
  <text x="235" y="84" class="ttl" text-anchor="middle">std::vector&lt;int&gt;  /  flat_map  /  std::array</text>
  <text x="235" y="100" class="sec" text-anchor="middle">contiguous heap allocation; cache-friendly</text>

  <!-- vector header on stack -->
  <text x="50" y="124" class="ttl-sub">Stack:</text>
  <rect class="b-stack" x="50" y="132" width="120" height="80"/>
  <text x="60" y="150" class="mono">std::vector</text>
  <line x1="50" y1="156" x2="170" y2="156" stroke="#7a6f55" stroke-width="0.5"/>
  <text x="60" y="172" class="mono">data ──→ ●</text>
  <text x="60" y="188" class="mono">size</text>
  <text x="60" y="204" class="mono">capacity</text>

  <!-- heap arrow -->
  <line x1="118" y1="172" x2="118" y2="244" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Heap label -->
  <text x="50" y="266" class="ttl-sub">Heap (contiguous):</text>

  <!-- Cache line 1 (16 ints) -->
  <text x="50" y="294" class="lbl">cache line 1 (64 B)</text>
  <rect class="b-cl-hot" x="50" y="300" width="320" height="30"/>
  <g>
    <rect class="b-cl-elem" x="50" y="300" width="20" height="30"/>
    <text x="60" y="320" class="mono-sm" text-anchor="middle">0</text>
    <rect class="b-cl-elem" x="70" y="300" width="20" height="30"/>
    <text x="80" y="320" class="mono-sm" text-anchor="middle">1</text>
    <rect class="b-cl-elem" x="90" y="300" width="20" height="30"/>
    <text x="100" y="320" class="mono-sm" text-anchor="middle">2</text>
    <rect class="b-cl-elem" x="110" y="300" width="20" height="30"/>
    <text x="120" y="320" class="mono-sm" text-anchor="middle">3</text>
    <rect class="b-cl-elem" x="130" y="300" width="20" height="30"/>
    <text x="140" y="320" class="mono-sm" text-anchor="middle">4</text>
    <rect class="b-cl-elem" x="150" y="300" width="20" height="30"/>
    <text x="160" y="320" class="mono-sm" text-anchor="middle">5</text>
    <rect class="b-cl-elem" x="170" y="300" width="20" height="30"/>
    <text x="180" y="320" class="mono-sm" text-anchor="middle">6</text>
    <rect class="b-cl-elem" x="190" y="300" width="20" height="30"/>
    <text x="200" y="320" class="mono-sm" text-anchor="middle">7</text>
    <rect class="b-cl-elem" x="210" y="300" width="20" height="30"/>
    <text x="220" y="320" class="mono-sm" text-anchor="middle">8</text>
    <rect class="b-cl-elem" x="230" y="300" width="20" height="30"/>
    <text x="240" y="320" class="mono-sm" text-anchor="middle">9</text>
    <rect class="b-cl-elem" x="250" y="300" width="20" height="30"/>
    <text x="260" y="320" class="mono-sm" text-anchor="middle">10</text>
    <rect class="b-cl-elem" x="270" y="300" width="20" height="30"/>
    <text x="280" y="320" class="mono-sm" text-anchor="middle">11</text>
    <rect class="b-cl-elem" x="290" y="300" width="20" height="30"/>
    <text x="300" y="320" class="mono-sm" text-anchor="middle">12</text>
    <rect class="b-cl-elem" x="310" y="300" width="20" height="30"/>
    <text x="320" y="320" class="mono-sm" text-anchor="middle">13</text>
    <rect class="b-cl-elem" x="330" y="300" width="20" height="30"/>
    <text x="340" y="320" class="mono-sm" text-anchor="middle">14</text>
    <rect class="b-cl-elem" x="350" y="300" width="20" height="30"/>
    <text x="360" y="320" class="mono-sm" text-anchor="middle">15</text>
  </g>

  <!-- Cache line 2 (next 16 ints) -->
  <text x="50" y="354" class="lbl">cache line 2 (64 B)</text>
  <rect class="b-cl-hot" x="50" y="360" width="320" height="20"/>
  <text x="210" y="374" class="mono-sm" text-anchor="middle" fill="#666">elements 16-31 ...</text>

  <!-- Iteration cost -->
  <line x1="50" y1="400" x2="420" y2="400" stroke="#5a8870" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="420" class="ttl-sub">Iteration cost:</text>
  <text x="50" y="438" class="green-t">≈ 1 cache miss per 16 ints  (4 B × 16 = 64 B)</text>
  <text x="50" y="454" class="green-l">L1 hardware prefetcher loves this</text>
  <text x="50" y="470" class="green-l">measured at &lt; 1 ns per element on a warm cache</text>

  <!-- RIGHT: list/map (node-based) -->
  <rect class="band b-list" x="460" y="60" width="410" height="430"/>
  <text x="665" y="84" class="ttl" text-anchor="middle">std::list&lt;int&gt;  /  std::map&lt;K,V&gt;  /  std::unordered_map</text>
  <text x="665" y="100" class="sec" text-anchor="middle">one heap allocation per element; cache-unfriendly</text>

  <!-- list header on stack -->
  <text x="480" y="124" class="ttl-sub">Stack:</text>
  <rect class="b-stack" x="480" y="132" width="100" height="60"/>
  <text x="490" y="150" class="mono">std::list</text>
  <line x1="480" y1="156" x2="580" y2="156" stroke="#7a6f55" stroke-width="0.5"/>
  <text x="490" y="172" class="mono">head ──→ ●</text>
  <text x="490" y="188" class="mono">size</text>

  <!-- Heap label -->
  <text x="480" y="222" class="ttl-sub">Heap (scattered):</text>

  <!-- Nodes scattered across memory -->
  <rect class="b-node" x="480" y="244" width="80" height="36"/>
  <text x="520" y="260" class="mono" text-anchor="middle">data: 0</text>
  <text x="520" y="274" class="mono-sm" text-anchor="middle">next →</text>

  <rect class="b-node" x="620" y="244" width="80" height="36"/>
  <text x="660" y="260" class="mono" text-anchor="middle">data: 1</text>
  <text x="660" y="274" class="mono-sm" text-anchor="middle">next →</text>

  <rect class="b-node" x="500" y="296" width="80" height="36"/>
  <text x="540" y="312" class="mono" text-anchor="middle">data: 2</text>
  <text x="540" y="326" class="mono-sm" text-anchor="middle">next →</text>

  <rect class="b-node" x="700" y="296" width="80" height="36"/>
  <text x="740" y="312" class="mono" text-anchor="middle">data: 3</text>
  <text x="740" y="326" class="mono-sm" text-anchor="middle">next ...</text>

  <rect class="b-node" x="580" y="348" width="80" height="36"/>
  <text x="620" y="364" class="mono" text-anchor="middle">data: ...</text>

  <!-- Pointer arrows (RED) - scattered chase -->
  <path class="arrow-r" d="M 530 192 Q 510 220, 520 244" marker-end="url(#arrowhead-node)"/>
  <path class="arrow-r" d="M 560 262 Q 580 252, 620 262" marker-end="url(#arrowhead-node)"/>
  <path class="arrow-r" d="M 660 280 Q 600 290, 540 296" marker-end="url(#arrowhead-node)"/>
  <path class="arrow-r" d="M 580 314 Q 640 310, 700 314" marker-end="url(#arrowhead-node)"/>
  <path class="arrow-r" d="M 740 332 Q 680 360, 620 348" marker-end="url(#arrowhead-node)"/>

  <!-- "Cache miss" labels next to nodes -->
  <text x="565" y="240" class="accent-l">miss</text>
  <text x="705" y="240" class="accent-l">miss</text>
  <text x="585" y="292" class="accent-l">miss</text>
  <text x="785" y="292" class="accent-l">miss</text>
  <text x="665" y="344" class="accent-l">miss</text>

  <!-- Iteration cost -->
  <line x1="480" y1="400" x2="850" y2="400" stroke="#b86742" stroke-width="0.5" opacity="0.5"/>
  <text x="480" y="420" class="ttl-sub">Iteration cost:</text>
  <text x="480" y="438" class="accent-t">≈ 1 cache miss per element  (each is a pointer chase)</text>
  <text x="480" y="454" class="accent-l">hardware prefetcher cannot predict pointer targets</text>
  <text x="480" y="470" class="accent-l">measured at 15-40 ns per element typical</text>

  <!-- Footer -->
  <text x="450" y="514" class="sec" text-anchor="middle">"Pick contiguous unless you have a specific reason for the node-based variant; the cache cost is real and measurable in §6's demo-02."</text>
</svg>
