<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img"
     aria-label="RAII vs manual cleanup: two parallel function flows showing how RAII destructors fire on every exit path while manual close() loses the resource on early returns and exceptions">
  <defs>
    <style><![CDATA[
      .bg       { fill: #fdfbf7; }
      .grid     { stroke: #e8e1d3; stroke-width: 0.5; fill: none; }

      .panel    { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-bad{ fill: #fef3f0; stroke: #b86742; stroke-width: 1.5; rx: 8; ry: 8; }
      .panel-ok { fill: #eef5ed; stroke: #5a8870; stroke-width: 1.5; rx: 8; ry: 8; }

      .scope    { fill: #fbfaf6; stroke: #888; stroke-dasharray: 4 3; stroke-width: 1; rx: 4; ry: 4; }

      .step     { fill: #ffffff; stroke: #2d2d2d; stroke-width: 1; rx: 4; ry: 4; }
      .step-acq { fill: #e8f0fb; stroke: #4a73b8; }
      .step-use { fill: #fdfbf7; stroke: #2d2d2d; }
      .step-rel { fill: #d8e8df; stroke: #5a8870; }
      .step-leak{ fill: #fef3f0; stroke: #c0392b; }

      .ttl      { font: 700 18px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl     { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .pttl-bad { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #b86742; }
      .pttl-ok  { font: 700 14px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }
      .step-t   { font: 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: #1a1a1a; }
      .cap      { font: 13px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #1a1a1a; }
      .lbl      { font: italic 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #555; }
      .leak-l   { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #c0392b; }
      .ok-l     { font: italic 700 12px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5a8870; }

      .arrow    { stroke: #2d2d2d; stroke-width: 1.3; fill: none; }
      .arrow-leak { stroke: #c0392b; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
      .arrow-ok { stroke: #5a8870; stroke-width: 1.6; fill: none; }
    ]]></style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" class="grid"/>
    </pattern>
    <marker id="ah-blk" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d2d2d"/>
    </marker>
    <marker id="ah-leak" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="ah-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a8870"/>
    </marker>
  </defs>

  <rect class="bg" width="920" height="560"/>
  <rect width="920" height="560" fill="url(#grid)"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" class="ttl">RAII: tying resource lifetime to scope</text>
  <text x="460" y="56" text-anchor="middle" class="cap">Manual cleanup leaks on early-exit paths · RAII destructor fires on all of them</text>

  <!-- ════════════ LEFT PANEL: manual cleanup (bad) ════════════ -->
  <rect class="panel-bad" x="40" y="80" width="400" height="450"/>
  <text x="240" y="106" text-anchor="middle" class="pttl-bad">Manual cleanup — three exit paths, two leak</text>

  <!-- function scope outline -->
  <rect class="scope" x="60" y="125" width="360" height="385"/>
  <text x="70" y="142" class="lbl">int read_count(...) {</text>

  <!-- step: open() -->
  <rect class="step step-acq" x="80" y="155" width="320" height="34"/>
  <text x="240" y="177" text-anchor="middle" class="step-t">int fd = ::open(path, O_RDONLY);</text>

  <!-- branch: open failed -->
  <rect class="step step-use" x="80" y="200" width="320" height="34"/>
  <text x="240" y="222" text-anchor="middle" class="step-t">if (fd &lt; 0) return -1;</text>

  <!-- step: read() -->
  <rect class="step step-use" x="80" y="245" width="320" height="34"/>
  <text x="240" y="267" text-anchor="middle" class="step-t">ssize_t n = ::read(fd, buf, ...);</text>

  <!-- branch: read failed -->
  <rect class="step step-leak" x="80" y="290" width="320" height="34"/>
  <text x="240" y="312" text-anchor="middle" class="step-t">if (n &lt; 0) return -1;</text>

  <!-- step: parse_int -->
  <rect class="step step-leak" x="80" y="335" width="320" height="34"/>
  <text x="240" y="357" text-anchor="middle" class="step-t">int v = parse_int(buf, n);</text>

  <!-- step: close() -->
  <rect class="step step-rel" x="80" y="380" width="320" height="34"/>
  <text x="240" y="402" text-anchor="middle" class="step-t">::close(fd);</text>
  <text x="240" y="416" text-anchor="middle" class="lbl">↑ only happens on the happy path</text>

  <!-- step: return -->
  <rect class="step step-use" x="80" y="430" width="320" height="34"/>
  <text x="240" y="452" text-anchor="middle" class="step-t">return v;</text>

  <text x="70" y="492" class="lbl">}</text>

  <!-- LEAK arrows pointing to leak labels at the right edge -->
  <path d="M 400 307 L 422 307" class="arrow-leak" marker-end="url(#ah-leak)"/>
  <text x="425" y="304" class="leak-l">leaks fd</text>
  <text x="425" y="316" class="lbl">(early return)</text>

  <path d="M 400 352 L 422 352" class="arrow-leak" marker-end="url(#ah-leak)"/>
  <text x="425" y="349" class="leak-l">leaks fd</text>
  <text x="425" y="361" class="lbl">(if throws)</text>

  <!-- ════════════ RIGHT PANEL: RAII (good) ════════════ -->
  <rect class="panel-ok" x="480" y="80" width="400" height="450"/>
  <text x="680" y="106" text-anchor="middle" class="pttl-ok">RAII — destructor fires on every exit path</text>

  <!-- function scope outline -->
  <rect class="scope" x="500" y="125" width="360" height="385"/>
  <text x="510" y="142" class="lbl">int read_count(...) {</text>

  <!-- step: unique_fd -->
  <rect class="step step-acq" x="520" y="155" width="320" height="34"/>
  <text x="680" y="177" text-anchor="middle" class="step-t">unique_fd fd{ ::open(path, ...) };</text>

  <!-- branch: open failed -->
  <rect class="step step-use" x="520" y="200" width="320" height="34"/>
  <text x="680" y="222" text-anchor="middle" class="step-t">if (!fd.is_open()) return -1;</text>

  <!-- step: read() -->
  <rect class="step step-use" x="520" y="245" width="320" height="34"/>
  <text x="680" y="267" text-anchor="middle" class="step-t">ssize_t n = ::read(fd.get(), ...);</text>

  <!-- branch: read failed -->
  <rect class="step step-use" x="520" y="290" width="320" height="34"/>
  <text x="680" y="312" text-anchor="middle" class="step-t">if (n &lt; 0) return -1;</text>

  <!-- step: parse_int -->
  <rect class="step step-use" x="520" y="335" width="320" height="34"/>
  <text x="680" y="357" text-anchor="middle" class="step-t">return parse_int(buf, n);</text>

  <!-- destructor zone -->
  <rect class="step step-rel" x="520" y="385" width="320" height="48"/>
  <text x="680" y="403" text-anchor="middle" class="step-t">// at scope exit:  ~unique_fd()</text>
  <text x="680" y="421" text-anchor="middle" class="step-t">// → ::close(fd_)  ✓</text>

  <text x="510" y="467" class="lbl">}</text>
  <text x="510" y="488" class="lbl">// destructor runs on:</text>
  <text x="510" y="503" class="lbl">//   normal return · early return · exception</text>

  <!-- OK arrows from each return path to the destructor box -->
  <path d="M 840 217 Q 870 217 870 405 L 845 405" class="arrow-ok" marker-end="url(#ah-ok)"/>
  <path d="M 840 307 Q 880 307 880 410 L 845 410" class="arrow-ok" marker-end="url(#ah-ok)"/>
  <path d="M 840 352 Q 890 352 890 415 L 845 415" class="arrow-ok" marker-end="url(#ah-ok)"/>
  <text x="892" y="290" class="ok-l" transform="rotate(90 892 290)">all paths →  ~unique_fd()</text>
</svg>
