# Demo-03 brings up:
#   - demo-03-svc (this dir): three servers in one binary
#       :50051 gRPC Echo (callback API)
#       :9000  io_uring TCP echo (direct liburing)
#       :9001  Asio TCP echo (Asio io_uring backend)
#   - the shared LGTM observability stack (../../observability/compose.yml)
#
# Bring up:
#   podman compose -f compose.yml -f ../../observability/compose.yml up --build
# Tear down:
#   ./demo.sh --clean

services:
  demo-03-svc:
    build:
      context: .
      dockerfile: Containerfile
    image: cpp-tut/demo-03:latest
    container_name: demo03-svc
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      OTEL_SERVICE_NAME: "demo-03-svc"
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=tutorial"
    # Container security has TWO independent layers gating io_uring;
    # both must be disabled for the tutorial demo to work.
    #
    # 1. seccomp. Default profile blocks io_uring_setup /
    #    io_uring_enter / io_uring_register. Denials return EPERM
    #    (errno 1). Bypass: `seccomp=unconfined`.
    #
    # 2. SELinux. Fedora/RHEL ship enforcing by default. The
    #    `container_t` policy denies io_uring syscalls from
    #    container processes. Denials return EACCES (errno 13).
    #    Bypass: `label=disable` (only this container is unlabeled;
    #    other containers stay confined).
    #
    # Symptoms when one is missing:
    #   - seccomp blocking → io_uring_setup returns -EPERM
    #     ("Operation not permitted")
    #   - SELinux blocking → io_uring_setup returns -EACCES
    #     ("Permission denied")  ← this is what r65 surfaced
    #
    # Production: write a custom seccomp profile + a custom SELinux
    # policy module that grants container_t the io_uring syscall
    # set, instead of blanket-disabling both. The kernel's own
    # IORING_OP_* permissions then enforce per-op restrictions.
    # See G-32 in _plans/reconciliation-plan.md for the full story.
    security_opt:
      - "seccomp=unconfined"
      - "label=disable"
    ports:
      - "127.0.0.1:18403:8080"   # healthz
      - "127.0.0.1:50051:50051"  # gRPC Echo
      - "127.0.0.1:9000:9000"    # io_uring TCP echo
      - "127.0.0.1:9001:9001"    # Asio TCP echo
    depends_on:
      - lgtm
    networks:
      - obs

networks:
  obs:
    name: tutorial-obs
    external: false
