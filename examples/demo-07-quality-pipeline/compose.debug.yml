# Bring up the service plus a gdbserver sidecar.
#
#   podman compose -f compose.debug.yml up --build
#
# Then from the host:
#   gdb -ex 'target remote 127.0.0.1:1234' \
#       -ex 'set sysroot /' \
#       build/release-debuginfo/demo06-svc

services:
  demo06-svc:
    build:
      context: .
      target: svc
    image: cpp-tut/demo-07:svc
    container_name: demo06-svc

  demo06-gdbserver:
    build:
      context: .
      target: gdbserver
    image: cpp-tut/demo-07:gdbserver
    container_name: demo06-gdbserver
    ports:
      - "127.0.0.1:1234:1234"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
