# Demo-06 observe-mode overlay (r85+).
#
# An OVERLAY on top of compose-serve.yml — adds OTel environment
# variables to each of the 3 services and joins them to the
# `tutorial-obs` network where the LGTM bundle lives. Doesn't
# repeat the service definitions; relies on compose-serve.yml as
# the base.
#
# Usage:
#
#   podman compose \
#       -f examples/demo-06-memory-and-allocators/compose-serve.yml \
#       -f examples/demo-06-memory-and-allocators/compose-observe.yml \
#       -f observability/compose.yml \
#       up --build
#
# The three -f files are merged in order, later files overlaying
# earlier ones. So the final picture is:
#
#   - compose-serve.yml:    defines demo06-svc-{std,pmr,mimalloc},
#                           port mappings, the `demo06` network alias
#                           (named `tutorial-demo06` externally)
#   - compose-observe.yml:  adds OTEL_* env vars, joins services
#                           to `obs` network alias (named
#                           `tutorial-obs` externally), depends_on lgtm
#   - observability/compose.yml: defines the lgtm service itself
#                           and declares the `obs` network alias
#
# IMPORTANT — alias vs name distinction (r86 fix):
# In compose YAML, `networks:` under a service uses the
# project-local *alias* (the YAML key under top-level
# `networks:`), NOT the `name:` field. The `name:` field is the
# external Docker/podman network name. So:
#
#   services:
#     foo:
#       networks:
#         - demo06        ← project-local alias used by service refs
#   networks:
#     demo06:             ← alias declaration
#       name: tutorial-demo06   ← actual podman network name
#
# r85 originally used `tutorial-demo06` in service network refs,
# which compose rejected with "undefined network tutorial-demo06."
# Fixed in r86 to use the `demo06` alias.
#
# Then in Grafana (http://localhost:3000):
#   Explore → Tempo → query traces by service.name
#   Explore → Mimir → demo06.requests, demo06.request.duration
#   Explore → Loki  → {service_name="demo06-svc-std"}, etc.
#
# Build cost on first run: 30-60 min (Conan compiles
# opentelemetry-cpp + grpc + protobuf + abseil + openssl from
# source). Subsequent rebuilds: ~30 seconds (just our app code).
# See Containerfile header for the full cost story.

services:

  demo06-svc-std:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      OTEL_SERVICE_NAME:          "demo06-svc-std"
      OTEL_RESOURCE_ATTRIBUTES:   "deployment.environment=tutorial,variant=std"
    networks:
      - demo06    # alias from compose-serve.yml (maps to tutorial-demo06)
      - obs       # alias from observability/compose.yml (maps to tutorial-obs)
    depends_on:
      - lgtm

  demo06-svc-pmr:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      OTEL_SERVICE_NAME:          "demo06-svc-pmr"
      OTEL_RESOURCE_ATTRIBUTES:   "deployment.environment=tutorial,variant=pmr"
    networks:
      - demo06
      - obs
    depends_on:
      - lgtm

  demo06-svc-mimalloc:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      OTEL_SERVICE_NAME:          "demo06-svc-mimalloc"
      OTEL_RESOURCE_ATTRIBUTES:   "deployment.environment=tutorial,variant=mimalloc"
    networks:
      - demo06
      - obs
    depends_on:
      - lgtm

# Declare both network aliases for self-validity when compose
# parses each -f file independently. The `obs` declaration matches
# observability/compose.yml's identical declaration (compose merges
# identical network declarations across files without conflict).
# `demo06` is declared identically to compose-serve.yml.
networks:
  demo06:
    name: tutorial-demo06
    external: false
  obs:
    name: tutorial-obs
    external: false

