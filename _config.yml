# ── Site identity ─────────────────────────────────────────────────────────────
title: Optimizing Modern C++ with Containers
description: >-
    A 1.5–3 hour PPTX presentation, an untimed companion Jekyll site, and
    six runnable Podman demos that teach modern-C++ performance work
    inside rootless OCI containers, end-to-end on Fedora 44.
author: cpp-container-optimization-tutorial contributors
brand_emoji: "⚡"

# Set this to your GitHub username/org once the repo is pushed; the
# header/footer use it to build the "GitHub ↗" link and the
# examples/ and diagrams/ directory cross-links.
github_username: patterncatalyst
github_repo: cpp-container-optimization-tutorial

# ── URL configuration ─────────────────────────────────────────────────────────
# Set baseurl to match the repository name when published on GitHub Pages.
# Override locally with: bundle exec jekyll serve --baseurl ""
baseurl: "/cpp-container-optimization-tutorial"
url: "https://patterncatalyst.github.io"

# ── Build settings ────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /:path/:basename/

kramdown:
    input: GFM
    syntax_highlighter: rouge
    toc_levels: 2..3
    hard_wrap: false

# ── Collections ───────────────────────────────────────────────────────────────
# `docs` is the tutorial body. `plans` is the reconciliation plan and
# similar project-management material — included in the build so it can
# be cross-linked, but not advertised in the main nav. `reference` is
# auxiliary reference material (statelessness compendium and similar
# deep-research documents), organized under subdirectories.
collections:
    docs:
        output: true
        permalink: /docs/:name/
    plans:
        output: true
        permalink: /plans/:name/
    reference:
        output: true
        permalink: /reference/:path/

defaults:
    - scope:
          path: ""
          type: docs
      values:
          layout: tutorial
          sectionid: docs
    - scope:
          path: ""
          type: plans
      values:
          layout: plan
          sectionid: plans
    - scope:
          path: ""
          type: reference
      values:
          layout: tutorial
          sectionid: reference

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
    - jekyll-seo-tag
    - jekyll-sitemap
    - jekyll-redirect-from

# ── Build excludes ────────────────────────────────────────────────────────────
exclude:
    - Gemfile
    - Gemfile.lock
    - vendor
    - node_modules
    - README.md
    - .gitignore
    - PRD.md
    - PUSHING-TO-GITHUB.md
    - GETTING-STARTED.md
    - STARTING-WITH-CLAUDE.md
    - LICENSE
    - CONTRIBUTING.md
    - scripts/
    - observability/
    # examples/ holds runnable demo code that the tutorial references but is
    # not part of the rendered site. The trailing slash is critical — without
    # it, Jekyll's exclude matches both the examples/ directory AND the
    # examples.html page that lists the cards, causing /examples/ on the
    # live site to 404. Keep the slash.
    - examples/
    # presentation/ holds the PPTX deliverable. Linked to from the site
    # via the homepage and §0; the .pptx itself ships in releases, not
    # in the rendered HTML.
    - presentation/
    # diagrams/ as a folder IS served (.svg and .excalidraw both end up
    # at /diagrams/<name>.{svg,excalidraw}) — but the README inside is
    # for editors of the diagrams, not site readers.
    - diagrams/README.md
