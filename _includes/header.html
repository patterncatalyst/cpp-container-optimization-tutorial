<header class="site-header">
    <div class="container site-header__inner">
        <a class="site-header__brand" href="{{ '/' | relative_url }}">
            <span class="site-header__brand-emoji" aria-hidden="true">{{ site.brand_emoji | default: '⚡' }}</span>
            {{ site.title }}
        </a>

        <div class="site-nav__spacer"></div>

        <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/docs/00-outline/' | relative_url }}"
               {% if page.layout == 'tutorial' %}class="is-current"{% endif %}>
                Tutorial
            </a>
            <a href="{{ '/diagrams/' | relative_url }}"
               {% if page.url contains '/diagrams' %}class="is-current"{% endif %}>
                Diagrams
            </a>
            <a href="{{ '/examples/' | relative_url }}"
               {% if page.url contains '/examples' %}class="is-current"{% endif %}>
                Examples
            </a>
            <a href="{{ '/plans/reconciliation-plan/' | relative_url }}"
               {% if page.layout == 'plan' %}class="is-current"{% endif %}>
                Plan
            </a>
            <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}"
               rel="noopener">GitHub ↗</a>
        </nav>
    </div>
</header>
