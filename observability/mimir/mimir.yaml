target: all,alertmanager,overrides-exporter

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /tmp/mimir/blocks

blocks_storage:
  storage_prefix: blocks
  filesystem:
    dir: /tmp/mimir/blocks
  tsdb:
    dir: /tmp/mimir/tsdb

compactor:
  data_dir: /tmp/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    kvstore:
      store: memberlist

ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/ruler

store_gateway:
  sharding_ring:
    kvstore:
      store: memberlist
    replication_factor: 1

memberlist:
  bind_port: 7946

limits:
  ingestion_rate: 200000
  out_of_order_time_window: 1h
